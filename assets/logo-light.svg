<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <!-- ============= CROWN (gold) ============= -->
  <g transform="translate(200,60)" fill="#C9A961">
    <rect x="-26" y="20" width="52" height="4" rx="0.5"/>
    <line x1="-26" y1="14" x2="-26" y2="26" stroke="#C9A961" stroke-width="1.5"/>
    <line x1="26" y1="14" x2="26" y2="26" stroke="#C9A961" stroke-width="1.5"/>
    <path d="M -26 20 L -22 4 L -14 14 L -8 -2 L -3 6 L 0 -10 L 3 6 L 8 -2 L 14 14 L 22 4 L 26 20 Z"/>
    <circle cx="-22" cy="2" r="2"/>
    <circle cx="-8" cy="-4" r="2"/>
    <circle cx="0" cy="-13" r="2.5"/>
    <circle cx="8" cy="-4" r="2"/>
    <circle cx="22" cy="2" r="2"/>
  </g>

  <!-- ============= MEDALLION RINGS (cream lines, transparent fill) ============= -->
  <circle cx="200" cy="180" r="78" stroke="#F5F0E8" stroke-width="2.5" fill="transparent"/>
  <circle cx="200" cy="180" r="68" stroke="#F5F0E8" stroke-width="0.8" fill="transparent"/>

  <!-- ============= SB MONOGRAM (gold) ============= -->
  <g transform="translate(200,180)" font-family="'Frank Ruhl Libre', 'Times New Roman', serif" fill="#C9A961">
    <text x="-30" y="22" font-size="78" font-weight="600" font-style="italic" letter-spacing="-3">S</text>
    <text x="4" y="22" font-size="78" font-weight="600" font-style="italic" letter-spacing="-3">B</text>
  </g>

  <!-- ============= FLANKING SCROLL ORNAMENTS ============= -->
  <g transform="translate(95,180)" fill="#C9A961">
    <path d="M 0 0 Q 6 -5 14 -3 Q 22 -1 28 -7 Q 22 -1 28 5 Q 22 11 14 9 Q 6 11 0 6 Z" opacity="0.9"/>
    <circle cx="-6" cy="0" r="1.5"/>
  </g>
  <g transform="translate(305,180) scale(-1,1)" fill="#C9A961">
    <path d="M 0 0 Q 6 -5 14 -3 Q 22 -1 28 -7 Q 22 -1 28 5 Q 22 11 14 9 Q 6 11 0 6 Z" opacity="0.9"/>
    <circle cx="-6" cy="0" r="1.5"/>
  </g>

  <!-- ============= DECORATIVE LINE under medallion ============= -->
  <line x1="80" y1="280" x2="320" y2="280" stroke="#C9A961" stroke-width="0.8"/>
  <circle cx="80" cy="280" r="1.5" fill="#C9A961"/>
  <circle cx="320" cy="280" r="1.5" fill="#C9A961"/>

  <!-- ============= BRAND NAME (cream) ============= -->
  <text x="200" y="345" text-anchor="middle"
        font-family="'Frank Ruhl Libre', 'David Libre', serif"
        font-size="56" font-weight="600" fill="#F5F0E8"
        direction="rtl">שון בלאיש</text>

  <!-- ============= TAGLINE ============= -->
  <g transform="translate(200,395)">
    <line x1="-46" y1="0" x2="-12" y2="0" stroke="#F5F0E8" stroke-width="0.6"/>
    <line x1="12" y1="0" x2="46" y2="0" stroke="#F5F0E8" stroke-width="0.6"/>
    <circle cx="-50" cy="0" r="1.5" fill="#F5F0E8"/>
    <circle cx="50" cy="0" r="1.5" fill="#F5F0E8"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="'Frank Ruhl Libre', 'David Libre', serif"
          font-size="20" font-weight="500" fill="#F5F0E8"
          letter-spacing="3"
          direction="rtl">הפקות</text>
  </g>
</svg>
