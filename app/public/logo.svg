<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!--
    שון בלאיש · הפקות — canonical brand mark
    Black ink on transparent background. Matches `לוגו.png` (2026-05-20).
    Single-color #0F0E0C so it composites cleanly on any light surface.
  -->

  <!-- ============= CROWN (atop medallion) =====================================
       3-arched coronet with a tiny cross finial. Sits centered above the oval.
  -->
  <g fill="#0F0E0C" stroke="#0F0E0C" stroke-linejoin="round">
    <!-- cross finial -->
    <rect x="198.6" y="44" width="2.8" height="14"/>
    <rect x="194" y="48.5" width="12" height="2.8"/>
    <!-- center top jewel under cross -->
    <circle cx="200" cy="62" r="2.4" fill="#0F0E0C"/>
    <!-- 3 arches of the coronet, hairline strokes -->
    <path d="M 175 92 Q 200 64 225 92" fill="none" stroke="#0F0E0C" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 162 96 Q 178 78 192 92" fill="none" stroke="#0F0E0C" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 208 92 Q 222 78 238 96" fill="none" stroke="#0F0E0C" stroke-width="2.2" stroke-linecap="round"/>
    <!-- pearls at each arch base -->
    <circle cx="175" cy="92" r="2.4"/>
    <circle cx="225" cy="92" r="2.4"/>
    <circle cx="162" cy="96" r="2.2"/>
    <circle cx="238" cy="96" r="2.2"/>
    <!-- coronet base band with two small finial pearls flanking -->
    <rect x="158" y="96" width="84" height="2.6" rx="1"/>
    <circle cx="156" cy="97.3" r="2.6"/>
    <circle cx="244" cy="97.3" r="2.6"/>
  </g>

  <!-- ============= MEDALLION (oval, double-ringed) ============================
       Oval, not a perfect circle. Outer ring thicker, inner ring hairline.
  -->
  <ellipse cx="200" cy="170" rx="64" ry="72"
           stroke="#0F0E0C" stroke-width="2.4" fill="none"/>
  <ellipse cx="200" cy="170" rx="58" ry="66"
           stroke="#0F0E0C" stroke-width="0.9" fill="none"/>

  <!-- ============= SB MONOGRAM =================================================
       Upright serif caps, near-equal height, classic widow-and-orphan spacing.
       Frank Ruhl Libre is loaded by the app; falls back to Times New Roman.
  -->
  <g font-family="'Frank Ruhl Libre','Times New Roman',serif"
     font-size="76" font-weight="500" fill="#0F0E0C">
    <text x="171" y="195" text-anchor="middle">S</text>
    <text x="229" y="195" text-anchor="middle">B</text>
  </g>

  <!-- ============= DECORATIVE RULE under medallion ============================
       Hairline rule with diamond-shaped end caps (rotated squares), not dots.
  -->
  <g fill="#0F0E0C">
    <line x1="78" y1="270" x2="322" y2="270"
          stroke="#0F0E0C" stroke-width="0.9"/>
    <rect x="74" y="266" width="8" height="8" transform="rotate(45 78 270)"/>
    <rect x="318" y="266" width="8" height="8" transform="rotate(45 322 270)"/>
  </g>

  <!-- ============= BRAND NAME · שון בלאיש ====================================
       Hebrew serif, dominant size, RTL.
  -->
  <text x="200" y="320" text-anchor="middle"
        font-family="'Frank Ruhl Libre','David Libre',serif"
        font-size="44" font-weight="600" fill="#0F0E0C"
        direction="rtl">שון בלאיש</text>

  <!-- ============= TAGLINE · הפקות ============================================
       Tracked-out, framed by a hairline rule with a single diamond at each end.
  -->
  <g transform="translate(200,358)">
    <line x1="-46" y1="0" x2="-18" y2="0" stroke="#0F0E0C" stroke-width="0.6"/>
    <line x1="18"  y1="0" x2="46"  y2="0" stroke="#0F0E0C" stroke-width="0.6"/>
    <rect x="-53" y="-3.5" width="6" height="6" transform="rotate(45 -50 0)" fill="#0F0E0C"/>
    <rect x="47"  y="-3.5" width="6" height="6" transform="rotate(45 50 0)"  fill="#0F0E0C"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="'Frank Ruhl Libre','David Libre',serif"
          font-size="14" font-weight="500" fill="#0F0E0C"
          letter-spacing="6"
          direction="rtl">הפקות</text>
  </g>
</svg>
