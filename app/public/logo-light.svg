<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!--
    שון בלאיש · הפקות — light variant for the in-app dark UI.
    Identical geometry to logo.svg; ink color is cream `#F5F0E8` so it sits
    cleanly on the dark Luxury Editorial palette. Per Behavioral Rule #13,
    THIS variant is for the React UI only — DOCX exports always use logo.svg.
  -->

  <!-- ============= CROWN ====================================================== -->
  <g fill="#F5F0E8" stroke="#F5F0E8" stroke-linejoin="round">
    <rect x="198.6" y="44" width="2.8" height="14"/>
    <rect x="194" y="48.5" width="12" height="2.8"/>
    <circle cx="200" cy="62" r="2.4" fill="#F5F0E8"/>
    <path d="M 175 92 Q 200 64 225 92" fill="none" stroke="#F5F0E8" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 162 96 Q 178 78 192 92" fill="none" stroke="#F5F0E8" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 208 92 Q 222 78 238 96" fill="none" stroke="#F5F0E8" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="175" cy="92" r="2.4"/>
    <circle cx="225" cy="92" r="2.4"/>
    <circle cx="162" cy="96" r="2.2"/>
    <circle cx="238" cy="96" r="2.2"/>
    <rect x="158" y="96" width="84" height="2.6" rx="1"/>
    <circle cx="156" cy="97.3" r="2.6"/>
    <circle cx="244" cy="97.3" r="2.6"/>
  </g>

  <!-- ============= MEDALLION ================================================== -->
  <ellipse cx="200" cy="170" rx="64" ry="72"
           stroke="#F5F0E8" stroke-width="2.4" fill="none"/>
  <ellipse cx="200" cy="170" rx="58" ry="66"
           stroke="#F5F0E8" stroke-width="0.9" fill="none"/>

  <!-- ============= SB MONOGRAM =============================================== -->
  <g font-family="'Frank Ruhl Libre','Times New Roman',serif"
     font-size="76" font-weight="500" fill="#F5F0E8">
    <text x="171" y="195" text-anchor="middle">S</text>
    <text x="229" y="195" text-anchor="middle">B</text>
  </g>

  <!-- ============= DECORATIVE RULE ========================================== -->
  <g fill="#F5F0E8">
    <line x1="78" y1="270" x2="322" y2="270"
          stroke="#F5F0E8" stroke-width="0.9"/>
    <rect x="74" y="266" width="8" height="8" transform="rotate(45 78 270)"/>
    <rect x="318" y="266" width="8" height="8" transform="rotate(45 322 270)"/>
  </g>

  <!-- ============= BRAND NAME ================================================ -->
  <text x="200" y="320" text-anchor="middle"
        font-family="'Frank Ruhl Libre','David Libre',serif"
        font-size="44" font-weight="600" fill="#F5F0E8"
        direction="rtl">שון בלאיש</text>

  <!-- ============= TAGLINE =================================================== -->
  <g transform="translate(200,358)">
    <line x1="-46" y1="0" x2="-18" y2="0" stroke="#F5F0E8" stroke-width="0.6"/>
    <line x1="18"  y1="0" x2="46"  y2="0" stroke="#F5F0E8" stroke-width="0.6"/>
    <rect x="-53" y="-3.5" width="6" height="6" transform="rotate(45 -50 0)" fill="#F5F0E8"/>
    <rect x="47"  y="-3.5" width="6" height="6" transform="rotate(45 50 0)"  fill="#F5F0E8"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="'Frank Ruhl Libre','David Libre',serif"
          font-size="14" font-weight="500" fill="#F5F0E8"
          letter-spacing="6"
          direction="rtl">הפקות</text>
  </g>
</svg>
